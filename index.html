<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wedding Planner</title>
    
    <!-- 모바일 홈 화면 설치 설정 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="우리결혼">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3656/3656842.png">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #ffffff;
            color: #0f172a; 
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            touch-action: pan-y;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f1f5f9; border-radius: 10px; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        button:active { transform: scale(0.95); }
        .spin-anim { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 모바일 날짜 입력창 스타일 */
        input[type="date"] {
            appearance: none;
            -webkit-appearance: none;
            background-color: #f8fafc;
            border-radius: 12px;
            font-size: 14px;
            padding: 12px;
            border: none;
            outline: none;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 독립형 SVG 아이콘 컴포넌트
        const Icon = ({ name, size = 18, className = "", color = "currentColor" }) => {
            const icons = {
                settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2a2 2 0 0 1-2 2a2 2 0 0 1-2-2a2 2 0 0 0-2-2h-.44a2 2 0 0 0-2 2v.44a2 2 0 0 0 2 2a2 2 0 0 1 2 2a2 2 0 0 1-2 2a2 2 0 0 0-2 2v.44a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2a2 2 0 0 1 2-2a2 2 0 0 1 2 2a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.44a2 2 0 0 0-2-2a2 2 0 0 1-2-2a2 2 0 0 1 2-2a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2ZM12 15a3 3 0 1 1 0-6a3 3 0 0 1 0 6Z"/>,
                trash: <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2m-6 5v6m4-6v6"/>,
                plus: <path d="M12 5v14m-7-7h14"/>,
                clock: <path d="M12 6v6l4 2m5-2a9 9 0 1 1-18 0a9 9 0 0 1 18 0z"/>,
                check: <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4L12 14.01l-3-3"/>,
                circle: <circle cx="12" cy="12" r="10"/>,
                list: <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>,
                refresh: <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>,
                chevronDown: <path d="m6 9 6 6 6-6"/>,
                chevronUp: <path d="m18 15-6-6-6 6"/>,
                x: <path d="M18 6L6 18M6 6l12 12"/>,
                edit: <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>,
                target: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
                calendar: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><path d="M16 2v4M8 2v4M3 10h18"/></>,
                arrowUp: <path d="m18 15-6-6-6 6"/>,
                arrowDown: <path d="m6 9 6 6 6-6"/>
            };
            return (
                <svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            // --- 데이터 상태 ---
            const [appTitle, setAppTitle] = useState(() => localStorage.getItem('wedding_title') || '우리결혼 웨딩플래너');
            const [isEditingTitle, setIsEditingTitle] = useState(false);
            const [categories, setCategories] = useState(() => {
                const saved = localStorage.getItem('wedding_categories');
                return saved ? JSON.parse(saved) : [
                    { id: 'cat1', name: '스드메', icon: '📸', order: 0 },
                    { id: 'cat2', name: '본식', icon: '💍', order: 1 },
                    { id: 'cat3', name: '신혼여행', icon: '✈️', order: 2 },
                    { id: 'cat4', name: '신혼집', icon: '🏠', order: 3 }
                ];
            });
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('wedding_tasks');
                return saved ? JSON.parse(saved) : [];
            });
            const [budgetGoals, setBudgetGoals] = useState(() => {
                const saved = localStorage.getItem('wedding_budget_goals');
                return saved ? JSON.parse(saved) : {}; 
            });
            
            // --- UI 상태 ---
            const [expandedCategories, setExpandedCategories] = useState(['cat1', 'cat2', 'cat3', 'cat4']);
            const [expandedMonth, setExpandedMonth] = useState(null);
            const [showAddModal, setShowAddModal] = useState(false);
            const [showCategoryEditModal, setShowCategoryEditModal] = useState(false);
            const [showNewCategoryModal, setShowNewCategoryModal] = useState(false);
            const [showGoalModal, setShowGoalModal] = useState(null); 
            const [deleteTarget, setDeleteTarget] = useState(null);
            const [editingTask, setEditingTask] = useState(null);
            const [activeCategory, setActiveCategory] = useState(null);
            const [rates, setRates] = useState({ USD: { rate: "1,350", change: 0 }, EUR: { rate: "1,460", change: 0 } });
            const [lastRateUpdate, setLastRateUpdate] = useState("");
            const [isRateLoading, setIsRateLoading] = useState(false);
            const [newTask, setNewTask] = useState({ title: '', categoryId: '', detail: '', date: '', price: '' });
            const [categoryForm, setCategoryForm] = useState({ name: '', icon: '' });
            const [tempGoal, setTempGoal] = useState("");

            const weddingDate = new Date('2026-08-22');
            const [dDay, setDDay] = useState(0);

            // 로컬 저장 연동
            useEffect(() => { localStorage.setItem('wedding_title', appTitle); }, [appTitle]);
            useEffect(() => { localStorage.setItem('wedding_categories', JSON.stringify(categories)); }, [categories]);
            useEffect(() => { localStorage.setItem('wedding_tasks', JSON.stringify(tasks)); }, [tasks]);
            useEffect(() => { localStorage.setItem('wedding_budget_goals', JSON.stringify(budgetGoals)); }, [budgetGoals]);

            // D-day 계산 (2026-08-22 기준)
            const calculateDDay = () => {
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const target = new Date(2026, 7, 22); 
                const diffTime = target.getTime() - today.getTime();
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                setDDay(diffDays);
            };

            const fetchRates = async () => {
                setIsRateLoading(true);
                try {
                    const response = await fetch('https://open.er-api.com/v6/latest/KRW');
                    const data = await response.json();
                    if (data && data.rates) {
                        const usd = (1 / data.rates.USD).toFixed(2);
                        const eur = (1 / data.rates.EUR).toFixed(2);
                        setRates({
                            USD: { rate: usd.replace(/\B(?=(\d{3})+(?!\d))/g, ","), change: 0 },
                            EUR: { rate: eur.replace(/\B(?=(\d{3})+(?!\d))/g, ","), change: 0 }
                        });
                        const now = new Date();
                        setLastRateUpdate(`${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`);
                    }
                } catch (e) {} finally { setTimeout(() => setIsRateLoading(false), 600); }
            };

            useEffect(() => {
                calculateDDay();
                fetchRates();
            }, []);

            // --- 유틸리티 및 로직 ---
            const formatWithCommas = (v) => (v === undefined || v === null || v === "" || v === 0) ? "" : v.toString().replace(/,/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            const stripCommas = (v) => v ? v.toString().replace(/,/g, "") : "";

            const calculateTaskDDay = (taskDate) => {
                if (!taskDate) return null;
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const target = new Date(taskDate);
                const diffTime = target.getTime() - today.getTime();
                const diff = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                return diff === 0 ? "Today" : (diff > 0 ? `D-${diff}` : `D+${Math.abs(diff)}`);
            };

            const getSortedTasks = (catId) => {
                return tasks
                    .filter(t => t.categoryId === catId)
                    .sort((a, b) => {
                        if (a.status === 'done' && b.status !== 'done') return 1;
                        if (a.status !== 'done' && b.status === 'done') return -1;
                        if (a.date && b.date) return new Date(a.date) - new Date(b.date);
                        if (a.date && !b.date) return -1;
                        if (!a.date && b.date) return 1;
                        return 0;
                    });
            };

            const saveTask = () => {
                if (!newTask.title.trim()) return;
                const taskData = { 
                    ...newTask, 
                    id: editingTask ? editingTask.id : Date.now().toString(),
                    price: parseInt(stripCommas(newTask.price)) || 0, 
                    categoryId: newTask.categoryId || (categories[0]?.id || ''),
                    status: editingTask ? editingTask.status : 'todo'
                };
                if (editingTask) setTasks(tasks.map(t => t.id === editingTask.id ? taskData : t));
                else setTasks([...tasks, taskData]);
                setShowAddModal(false); setEditingTask(null); setNewTask({ title: '', categoryId: '', detail: '', date: '', price: '' });
            };

            const moveCategory = (index, direction) => {
                const newCats = [...categories];
                if (direction === 'up' && index > 0) {
                    [newCats[index - 1], newCats[index]] = [newCats[index], newCats[index - 1]];
                } else if (direction === 'down' && index < newCats.length - 1) {
                    [newCats[index + 1], newCats[index]] = [newCats[index], newCats[index + 1]];
                }
                setCategories(newCats.map((c, i) => ({ ...c, order: i })));
            };

            const addNewCategory = () => {
                if (!categoryForm.name.trim()) return;
                const newId = Date.now().toString();
                setCategories([...categories, { ...categoryForm, id: newId, order: categories.length }]);
                setExpandedCategories([...expandedCategories, newId]);
                setCategoryForm({ name: '', icon: '' });
                setShowNewCategoryModal(false);
            };

            const executeDelete = () => {
                if (!deleteTarget) return;
                if (deleteTarget.type === 'category') {
                    setCategories(categories.filter(c => c.id !== deleteTarget.id));
                    setTasks(tasks.filter(t => t.categoryId !== deleteTarget.id));
                } else {
                    setTasks(tasks.filter(t => t.id !== deleteTarget.id));
                }
                setDeleteTarget(null);
            };

            const getMonthlyExpenses = () => {
                const exp = {};
                tasks.forEach(t => { const m = t.date ? t.date.substring(0, 7) : '미정'; if (!exp[m]) exp[m] = { total: 0, items: [] }; exp[m].total += (parseInt(t.price) || 0); exp[m].items.push(t); });
                return Object.entries(exp).sort((a,b) => a[0].localeCompare(b[0]));
            };

            const progressPercent = Math.round((tasks.filter(t => t.status === 'done').length / (tasks.length || 1)) * 100);

            return (
                <div className="min-h-screen pb-32 max-w-lg mx-auto bg-white shadow-sm relative text-left">
                    <header className="sticky top-0 z-40 bg-white/95 backdrop-blur-md px-6 py-6 flex justify-between items-center border-b border-slate-50">
                        <div>
                            <h1 className="text-xl font-bold tracking-tight text-slate-900" onClick={() => setIsEditingTitle(true)}>
                                {isEditingTitle ? <input autoFocus className="border-b border-slate-900 outline-none w-full font-bold" value={appTitle} onChange={e => setAppTitle(e.target.value)} onBlur={() => setIsEditingTitle(false)} /> : appTitle}
                            </h1>
                            <p className="text-[11px] font-medium text-slate-400 mt-0.5">2026.08.22 예식 · <span className="text-rose-500 font-black tracking-tighter">D-{dDay}</span></p>
                        </div>
                        <div className="flex flex-col items-end">
                            <div className="text-[10px] font-bold text-rose-300 uppercase mb-1 tracking-tighter">준비 현황 {progressPercent}%</div>
                            <div className="w-16 h-1 bg-slate-50 rounded-full overflow-hidden">
                                <div className="bg-rose-400 h-full transition-all duration-1000" style={{ width: `${progressPercent}%` }}></div>
                            </div>
                        </div>
                    </header>

                    <main className="px-6 py-8">
                        {categories.map((cat, index) => (
                            <div key={cat.id} className="mb-10 transition-all">
                                <div className="flex justify-between items-center mb-4 pb-2 border-b border-slate-100">
                                    <div className="flex items-center gap-2 flex-1 text-left">
                                        <div className="flex flex-col gap-0.5 mr-1">
                                            <button onClick={() => moveCategory(index, 'up')} className={`p-1 ${index === 0 ? 'text-slate-100' : 'text-slate-300 active:text-rose-400'}`} disabled={index === 0}>
                                                <Icon name="arrowUp" size={14} />
                                            </button>
                                            <button onClick={() => moveCategory(index, 'down')} className={`p-1 ${index === categories.length - 1 ? 'text-slate-100' : 'text-slate-300 active:text-rose-400'}`} disabled={index === categories.length - 1}>
                                                <Icon name="arrowDown" size={14} />
                                            </button>
                                        </div>
                                        <button onClick={() => setExpandedCategories(p => p.includes(cat.id) ? p.filter(i => i !== cat.id) : [...p, cat.id])} className="flex items-center gap-2 text-left flex-1">
                                            <span className="text-lg">{cat.icon}</span>
                                            <h2 className="font-bold text-sm text-slate-800">{cat.name}</h2>
                                            <span className="text-[10px] text-slate-400 ml-auto mr-1 font-bold">{formatWithCommas(tasks.filter(t => t.categoryId === cat.id).reduce((s,t) => s + (parseInt(t.price) || 0), 0))}원</span>
                                        </button>
                                    </div>
                                    <div className="flex items-center gap-1">
                                        <button onClick={() => { setActiveCategory(cat); setCategoryForm({ name: cat.name, icon: cat.icon }); setShowCategoryEditModal(true); }} className="p-2 text-slate-300 hover:text-slate-600"><Icon name="settings" size={16}/></button>
                                        <button onClick={() => setDeleteTarget({ type: 'category', id: cat.id, name: cat.name })} className="p-2 text-slate-300 hover:text-red-400"><Icon name="trash" size={16}/></button>
                                    </div>
                                </div>
                                {expandedCategories.includes(cat.id) && (
                                    <div className="space-y-3">
                                        {getSortedTasks(cat.id).map(task => {
                                            const tDDay = calculateTaskDDay(task.date);
                                            return (
                                                <div key={task.id} className={`flex items-center gap-4 p-3 rounded-xl border border-slate-50 transition-all ${task.status === 'done' ? 'bg-slate-50 opacity-50' : 'bg-white shadow-sm'}`}>
                                                    <button onClick={() => {
                                                        const order = ['todo', 'doing', 'done'];
                                                        const nextStatus = order[(order.indexOf(task.status) + 1) % 3];
                                                        setTasks(tasks.map(t => t.id === task.id ? { ...t, status: nextStatus } : t));
                                                    }} className="flex-shrink-0">
                                                        {task.status === 'done' ? <Icon name="check" size={22} color="#1e293b" /> : task.status === 'doing' ? <Icon name="clock" size={22} color="#fbbf24" /> : <Icon name="circle" size={22} color="#e2e8f0" />}
                                                    </button>
                                                    <div className="flex-1 min-w-0 text-left cursor-pointer" onClick={() => { setEditingTask(task); setNewTask({ title: task.title, categoryId: task.categoryId, detail: task.detail || '', date: task.date || '', price: (task.price || "").toString() }); setShowAddModal(true); }}>
                                                        <h3 className={`text-[13px] font-bold truncate ${task.status === 'done' ? 'text-slate-400 line-through' : 'text-slate-800'}`}>{task.title}</h3>
                                                        {/* 수정 사항: 메인 리스트에 날짜 표시 추가 */}
                                                        <p className="text-[10px] text-slate-400 mt-0.5">
                                                            <span className="font-bold text-slate-500 mr-1">{task.date || '날짜 미정'}</span> | {formatWithCommas(task.price)}원 | {task.status === 'done' ? '완료' : task.status === 'doing' ? '진행 중' : '시작 전'}
                                                        </p>
                                                    </div>
                                                    <div className="flex flex-col items-end gap-1 flex-shrink-0">
                                                        {tDDay && task.status !== 'done' && <span className="text-[9px] font-black px-2 py-0.5 rounded-full bg-rose-50 text-rose-500 tracking-tighter">{tDDay}</span>}
                                                        <button onClick={(e) => { e.stopPropagation(); setDeleteTarget({ type: 'task', id: task.id, name: task.title }); }} className="p-1.5 text-slate-200 hover:text-red-400 active:scale-110 transition-all"><Icon name="trash" size={14}/></button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        ))}
                        <button onClick={() => setShowNewCategoryModal(true)} className="w-full py-5 bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl text-slate-400 text-xs font-bold flex items-center justify-center gap-2 mb-16"><Icon name="plus" size={14}/> 카테고리 추가</button>

                        <div className="flex flex-col md:flex-row gap-6 mt-12 pt-10 border-t border-slate-50 text-left pb-16">
                            <section className="flex-[1.5]">
                                <h2 className="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em] mb-4">Budget</h2>
                                <div className="space-y-3">
                                    {getMonthlyExpenses().map(([month, data]) => {
                                        const goal = budgetGoals[month] || 0;
                                        const isOver = goal > 0 && data.total > goal;
                                        const percent = goal > 0 ? Math.min((data.total / goal) * 100, 100) : 0;
                                        return (
                                            <div key={month} className="group">
                                                <div className={`w-full flex flex-col p-3 rounded-xl border transition-all ${expandedMonth === month ? 'bg-slate-50 border-slate-200 shadow-sm' : 'bg-white border-slate-100 hover:bg-slate-50'}`}>
                                                    <div className="flex justify-between items-end mb-2">
                                                        <button onClick={() => setExpandedMonth(expandedMonth === month ? null : month)} className="flex items-center gap-1.5 font-bold text-[10px] uppercase tracking-tighter text-left">{month}<Icon name={expandedMonth === month ? "chevronUp" : "chevronDown"} size={10} color="#cbd5e1" /></button>
                                                        <div className="flex flex-col items-end gap-0.5">
                                                            <div className="flex items-center gap-1">
                                                                <span className="text-[11px] font-black text-slate-900">{formatWithCommas(data.total)}원</span>
                                                                <span className="text-slate-200">/</span>
                                                                <button onClick={() => { setShowGoalModal({ month }); setTempGoal(goal ? goal.toString() : ""); }} className="text-[10px] font-bold text-slate-400 hover:text-rose-400 flex items-center gap-0.5">{goal > 0 ? formatWithCommas(goal) : "목표설정"}<Icon name="edit" size={8} /></button>
                                                            </div>
                                                            {goal > 0 && <span className={`text-[8px] font-black ${isOver ? 'text-red-500' : 'text-slate-300'}`}>{Math.round((data.total / goal) * 100)}% 사용중</span>}
                                                        </div>
                                                    </div>
                                                    <div className="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden"><div className={`h-full transition-all duration-1000 ${isOver ? 'bg-red-400' : 'bg-rose-400'}`} style={{ width: `${percent}%` }}></div></div>
                                                </div>
                                                {expandedMonth === month && (
                                                    <div className="mt-2 ml-1 px-3 py-2 border-l-2 border-slate-100 space-y-2 animate-in bg-slate-50/50 rounded-r-xl">
                                                        {data.items.map(item => (<div key={item.id} className="flex justify-between items-center gap-4"><span className="text-[10px] text-slate-600 truncate font-medium">· {item.title}</span><span className="text-[10px] font-bold text-slate-800 whitespace-nowrap tracking-tight">{formatWithCommas(item.price)}원</span></div>))}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </section>

                            <section className="flex-1">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em]">Exchange</h2>
                                    <button onClick={fetchRates} className={`text-slate-300 hover:text-slate-900 ${isRateLoading ? 'spin-anim' : ''}`}><Icon name="refresh" size={12}/></button>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    {Object.entries(rates).map(([curr, data]) => (
                                        <div key={curr} className="p-3 bg-slate-50/50 rounded-xl border border-slate-100">
                                            <div className="flex justify-between items-start mb-1">
                                                <span className="text-[9px] font-bold text-blue-500 uppercase">{curr}</span>
                                                <span className="text-[8px] font-black text-slate-300">{lastRateUpdate}</span>
                                            </div>
                                            <div className="text-xs font-black text-slate-800">{data.rate} <span className="text-[10px] font-medium text-slate-400 font-bold">원</span></div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </main>

                    {/* 하단 고정 바: '+' 버튼 */}
                    <nav className="fixed bottom-10 left-1/2 -translate-x-1/2 z-50">
                        <button onClick={() => setShowAddModal(true)} className="w-14 h-14 bg-slate-900 text-white rounded-full flex items-center justify-center shadow-2xl active:scale-90 hover:scale-105 transition-all">
                            <Icon name="plus" size={28} />
                        </button>
                    </nav>

                    {/* 바텀 시트: 일정 추가 */}
                    {showAddModal && (
                        <div className="fixed inset-0 z-[100] flex items-end justify-center animate-fade-in bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-md rounded-t-[2.5rem] shadow-2xl overflow-hidden p-8 animate-slide-up">
                                <div className="flex justify-between items-center mb-6"><h3 className="text-lg font-bold text-slate-900">새 일정 추가</h3><button onClick={() => setShowAddModal(false)}><Icon name="x" size={22} color="#cbd5e1"/></button></div>
                                <div className="space-y-4 max-h-[70vh] overflow-y-auto custom-scrollbar pr-1">
                                    <div className="flex flex-wrap gap-2 mb-2">{categories.map(c => <button key={c.id} onClick={() => setNewTask({...newTask, categoryId: c.id})} className={`py-2 px-4 rounded-xl text-[11px] font-bold border transition-all ${newTask.categoryId === c.id ? 'bg-slate-900 text-white shadow-md' : 'bg-white text-slate-400'}`}>{c.name}</button>)}</div>
                                    <input type="text" value={newTask.title} onChange={e => setNewTask({...newTask, title: e.target.value})} placeholder="어떤 일을 해야 하나요?" className="w-full bg-slate-50 rounded-2xl px-5 py-4 text-sm font-medium outline-none focus:ring-2 focus:ring-slate-200" />
                                    <div className="grid grid-cols-2 gap-3">
                                        <input type="date" value={newTask.date} onChange={e => setNewTask({...newTask, date: e.target.value})} />
                                        <input 
                                            type="text" 
                                            inputMode="numeric"
                                            value={formatWithCommas(newTask.price)} 
                                            onChange={e => { 
                                                const rv = stripCommas(e.target.value); 
                                                if(!isNaN(rv)) { 
                                                    const num = parseInt(rv, 10); 
                                                    setNewTask({...newTask, price: isNaN(num) ? "" : num.toString()}); 
                                                } 
                                            }} 
                                            placeholder="비용 (원)" 
                                            className="w-full bg-slate-50 rounded-2xl px-5 py-4 text-sm font-bold outline-none focus:ring-2 focus:ring-slate-200" 
                                        />
                                    </div>
                                    <textarea value={newTask.detail} onChange={e => setNewTask({...newTask, detail: e.target.value})} rows="2" placeholder="상세 메모 (준비물 등)" className="w-full bg-slate-50 rounded-2xl px-5 py-4 text-sm font-medium outline-none resize-none focus:ring-2 focus:ring-slate-200" />
                                    <button onClick={saveTask} className="w-full bg-slate-900 text-white py-5 rounded-3xl font-black text-sm shadow-xl mt-2">저장하기</button>
                                </div>
                                <div className="h-6 w-full"></div>
                            </div>
                        </div>
                    )}

                    {/* 모달: 예산 목표 */}
                    {showGoalModal && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm animate-fade-in text-left">
                            <div className="bg-white w-full max-w-xs rounded-3xl shadow-2xl p-8 text-left">
                                <div className="flex items-center gap-2 mb-4"><Icon name="target" size={18} color="#fb7185" /><h3 className="text-base font-bold text-slate-900">{showGoalModal.month} 목표 예산</h3></div>
                                <div className="relative mb-6">
                                    <input 
                                        type="text" 
                                        inputMode="numeric"
                                        value={formatWithCommas(tempGoal)} 
                                        onChange={e => { const rv = stripCommas(e.target.value); if(!isNaN(rv)) setTempGoal(rv); }} 
                                        placeholder="금액 입력" 
                                        className="w-full bg-slate-50 rounded-xl px-4 py-4 text-sm font-bold outline-none focus:ring-2 focus:ring-rose-200" 
                                    />
                                    <span className="absolute right-4 top-1/2 -translate-y-1/2 text-xs font-bold text-slate-300">원</span>
                                </div>
                                <div className="flex gap-3"><button onClick={() => setShowGoalModal(null)} className="flex-1 py-3 text-xs font-bold text-slate-400 bg-slate-50 rounded-xl">취소</button><button onClick={() => { setBudgetGoals({...budgetGoals, [showGoalModal.month]: parseInt(tempGoal) || 0}); setShowGoalModal(null); }} className="flex-1 py-3 text-xs font-bold text-white bg-slate-900 rounded-xl shadow-lg">저장</button></div>
                            </div>
                        </div>
                    )}

                    {/* 모달: 삭제 확인 */}
                    {deleteTarget && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm animate-fade-in text-center">
                            <div className="bg-white w-full max-w-xs rounded-3xl shadow-2xl p-8 text-center"><Icon name="trash" size={32} color="#ef4444" className="mx-auto mb-4"/><h3 className="text-base font-bold text-slate-900 mb-2">삭제하시겠습니까?</h3><p className="text-xs text-slate-400 mb-8 leading-relaxed">"{deleteTarget.name}" 항목을 삭제합니다.</p><div className="flex gap-3"><button onClick={() => setDeleteTarget(null)} className="flex-1 py-3 text-xs font-bold text-slate-400 bg-slate-50 rounded-xl">취소</button><button onClick={executeDelete} className="flex-1 py-3 text-xs font-bold text-white bg-red-500 rounded-xl shadow-lg">삭제</button></div></div>
                        </div>
                    )}

                    {showNewCategoryModal && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-sm animate-fade-in text-left">
                            <div className="bg-white w-full max-w-xs rounded-2xl shadow-2xl p-6"><h3 className="text-sm font-bold text-slate-900 mb-6 font-black text-center">카테고리 추가</h3><div className="space-y-4"><input maxLength={2} className="w-full bg-slate-50 rounded-xl py-4 text-2xl text-center outline-none border-2 border-transparent focus:border-slate-100" value={categoryForm.icon} onChange={e => setCategoryForm({...categoryForm, icon: e.target.value})} placeholder="✨" /><input className="w-full bg-slate-50 rounded-xl px-4 py-3 text-sm outline-none font-bold focus:ring-2 focus:ring-slate-100" value={categoryForm.name} onChange={e => setCategoryForm({...categoryForm, name: e.target.value})} placeholder="이름 (예: 예산 관리)" /><div className="flex gap-3 mt-4"><button onClick={() => setShowNewCategoryModal(false)} className="flex-1 py-3 text-[11px] font-bold text-slate-400">취소</button><button onClick={addNewCategory} className="flex-1 bg-slate-900 text-white py-3 rounded-xl text-[11px] font-bold shadow-lg">추가</button></div></div></div>
                        </div>
                    )}
                    
                    {/* 수정 사항: 카테고리 수정 모달 (이름 수정 가능) */}
                    {showCategoryEditModal && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-sm animate-fade-in text-left">
                            <div className="bg-white w-full max-w-xs rounded-2xl shadow-2xl p-6">
                                <h3 className="text-sm font-bold text-slate-900 mb-6 font-black text-center">카테고리 수정</h3>
                                <div className="space-y-4">
                                    <p className="text-[10px] text-slate-400 text-center">아이콘과 이름을 수정할 수 있습니다.</p>
                                    <input maxLength={2} className="w-full bg-slate-50 rounded-xl py-4 text-2xl text-center outline-none border-2 border-transparent focus:border-slate-100" value={categoryForm.icon} onChange={e => setCategoryForm({...categoryForm, icon: e.target.value})} />
                                    <input className="w-full bg-slate-50 rounded-xl px-4 py-3 text-sm outline-none font-bold focus:ring-2 focus:ring-slate-100" value={categoryForm.name} onChange={e => setCategoryForm({...categoryForm, name: e.target.value})} />
                                    <div className="flex gap-2">
                                        <button onClick={() => setShowCategoryEditModal(false)} className="flex-1 py-3 text-[11px] font-bold text-slate-400">취소</button>
                                        <button onClick={() => { setCategories(categories.map(c => c.id === activeCategory.id ? { ...c, ...categoryForm } : c)); setShowCategoryEditModal(false); }} className="flex-1 bg-slate-900 text-white py-3 rounded-xl text-[11px] font-bold shadow-lg">저장</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
