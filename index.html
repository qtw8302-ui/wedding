<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wedding Planner</title>
    
    <!-- 모바일 홈 화면 설치 설정 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="우리결혼">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3656/3656842.png">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #ffffff;
            color: #0f172a; 
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            touch-action: pan-y;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f1f5f9; border-radius: 10px; }
        @keyframes slideUp { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-in { animation: slideUp 0.3s ease-out; }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        button:active { transform: scale(0.92); }
        .dragging { opacity: 0.5; background: #fef2f2 !important; border: 2px dashed #fda4af !important; }
        .spin-anim { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 날짜 입력창 모바일 스타일 보정 */
        input[type="date"] {
            position: relative;
            min-height: 52px;
        }
        input[type="date"]::before {
            content: "날짜 선택";
            position: absolute;
            left: 12px;
            color: #94a3b8;
            font-size: 14px;
            pointer-events: none;
        }
        input[type="date"]:focus::before,
        input[type="date"]:not([value=""])::before {
            display: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 아이콘 컴포넌트 (독립 SVG)
        const Icon = ({ name, size = 18, className = "", color = "currentColor" }) => {
            const icons = {
                settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2a2 2 0 0 1-2 2a2 2 0 0 1-2-2a2 2 0 0 0-2-2h-.44a2 2 0 0 0-2 2v.44a2 2 0 0 0 2 2a2 2 0 0 1 2 2a2 2 0 0 1-2 2a2 2 0 0 0-2 2v.44a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2a2 2 0 0 1 2-2a2 2 0 0 1 2 2a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.44a2 2 0 0 0-2-2a2 2 0 0 1-2-2a2 2 0 0 1 2-2a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2ZM12 15a3 3 0 1 1 0-6a3 3 0 0 1 0 6Z"/>,
                trash: <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2m-6 5v6m4-6v6"/>,
                plus: <path d="M12 5v14m-7-7h14"/>,
                clock: <path d="M12 6v6l4 2m5-2a9 9 0 1 1-18 0a9 9 0 0 1 18 0z"/>,
                check: <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4L12 14.01l-3-3"/>,
                circle: <circle cx="12" cy="12" r="10"/>,
                sparkles: <path d="M12 3l1.91 5.81L20 10.72l-4.5 4.39L16.59 21L12 17.27L7.41 21L8.5 15.11L4 10.72l6.09-1.91L12 3z"/>,
                list: <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>,
                refresh: <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>,
                chevronDown: <path d="m6 9 6 6 6-6"/>,
                chevronUp: <path d="m18 15-6-6-6 6"/>,
                x: <path d="M18 6L6 18M6 6l12 12"/>,
                save: <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2zM17 21v-8H7v8M7 3v5h8"/>,
                calendar: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><path d="M16 2v4M8 2v4M3 10h18"/></>
            };
            return (
                <svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const apiKey = ""; // Gemini API 키
            
            // --- 데이터 상태 (LocalStorage) ---
            const [appTitle, setAppTitle] = useState(() => localStorage.getItem('wedding_title') || '우리결혼 웨딩플래너');
            // 수정: ReferenceError 해결을 위한 state 추가
            const [isEditingTitle, setIsEditingTitle] = useState(false);
            
            const [categories, setCategories] = useState(() => {
                const saved = localStorage.getItem('wedding_categories');
                return saved ? JSON.parse(saved) : [
                    { id: 'cat1', name: '스드메', icon: '📸', order: 0 },
                    { id: 'cat2', name: '본식', icon: '🎁', order: 1 },
                    { id: 'cat3', name: '신혼여행', icon: '✈️', order: 2 },
                    { id: 'cat4', name: '신혼집', icon: '🏠', order: 3 }
                ];
            });
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('wedding_tasks');
                return saved ? JSON.parse(saved) : [];
            });
            
            // --- UI 상태 ---
            const [expandedCategories, setExpandedCategories] = useState(['cat1', 'cat2', 'cat3', 'cat4']);
            const [expandedMonth, setExpandedMonth] = useState(null);
            const [showAddModal, setShowAddModal] = useState(false);
            const [showCategoryEditModal, setShowCategoryEditModal] = useState(false);
            const [showNewCategoryModal, setShowNewCategoryModal] = useState(false);
            const [showAiModal, setShowAiModal] = useState(false);
            const [deleteTarget, setDeleteTarget] = useState(null);
            const [editingTask, setEditingTask] = useState(null);
            const [activeCategory, setActiveCategory] = useState(null);
            const [draggedCategoryIndex, setDraggedCategoryIndex] = useState(null);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [aiResponse, setAiResponse] = useState("");
            const [rates, setRates] = useState({ USD: { rate: "1,350", change: 0 }, EUR: { rate: "1,460", change: 0 } });
            const [lastRateUpdate, setLastRateUpdate] = useState("");
            const [isRateLoading, setIsRateLoading] = useState(false);
            const [newTask, setNewTask] = useState({ title: '', categoryId: '', detail: '', date: '', price: '' });
            const [categoryForm, setCategoryForm] = useState({ name: '', icon: '' });

            const weddingDate = new Date('2026-08-22');
            const [dDay, setDDay] = useState(0);

            // --- 데이터 저장 ---
            useEffect(() => { localStorage.setItem('wedding_title', appTitle); }, [appTitle]);
            useEffect(() => { localStorage.setItem('wedding_categories', JSON.stringify(categories)); }, [categories]);
            useEffect(() => { localStorage.setItem('wedding_tasks', JSON.stringify(tasks)); }, [tasks]);

            // --- 환율 API ---
            const fetchRates = async () => {
                setIsRateLoading(true);
                try {
                    const response = await fetch('https://open.er-api.com/v6/latest/KRW');
                    const data = await response.json();
                    if (data && data.rates) {
                        const usd = (1 / data.rates.USD).toFixed(2);
                        const eur = (1 / data.rates.EUR).toFixed(2);
                        setRates({
                            USD: { rate: usd.replace(/\B(?=(\d{3})+(?!\d))/g, ","), change: 0 },
                            EUR: { rate: eur.replace(/\B(?=(\d{3})+(?!\d))/g, ","), change: 0 }
                        });
                        const now = new Date();
                        setLastRateUpdate(`${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`);
                    }
                } catch (e) {} finally { setTimeout(() => setIsRateLoading(false), 600); }
            };

            useEffect(() => {
                const today = new Date(); today.setHours(0,0,0,0);
                setDDay(Math.ceil((weddingDate - today) / 86400000));
                fetchRates();
            }, []);

            // --- AI 기능 ---
            const callGemini = async (prompt) => {
                if(!apiKey) return "설정에서 Gemini API 키를 입력해 주세요.";
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: "당신은 15년 경력의 베테랑 웨딩 플래너입니다. 아주 현실적이고 명확하게 한국어로 답변하세요." }] }
                        })
                    });
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) { return "AI 서비스 연결 실패"; }
            };

            const getAiAdvice = async (type, data) => {
                setIsAiLoading(true); setShowAiModal(true); setAiResponse("");
                let prompt = type === 'exchange' ? `현재 환율이 달러 ${data.USD.rate}원, 유로 ${data.EUR.rate}원입니다. 환전 전략 조언해줘.` : `"${data.title}" 일정 예산 ${data.price}원이 적절한지 분석해줘.`;
                const advice = await callGemini(prompt);
                setAiResponse(advice || "조언을 가져오지 못했습니다.");
                setIsAiLoading(false);
            };

            // --- 비즈니스 로직 ---
            const formatWithCommas = (v) => (v === undefined || v === null || v === "" || v === 0) ? "" : v.toString().replace(/,/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            const stripCommas = (v) => v ? v.toString().replace(/,/g, "") : "";

            const calculateTaskDDay = (taskDate) => {
                if (!taskDate) return null;
                const today = new Date(); today.setHours(0,0,0,0);
                const target = new Date(taskDate); target.setHours(0,0,0,0);
                const diff = Math.ceil((target - today) / 86400000);
                return diff === 0 ? "Today" : (diff > 0 ? `D-${diff}` : `D+${Math.abs(diff)}`);
            };

            const executeDelete = () => {
                if (!deleteTarget) return;
                if (deleteTarget.type === 'category') {
                    setCategories(categories.filter(c => c.id !== deleteTarget.id));
                    setTasks(tasks.filter(t => t.categoryId !== deleteTarget.id));
                } else {
                    setTasks(tasks.filter(t => t.id !== deleteTarget.id));
                }
                setDeleteTarget(null);
            };

            const handleDragOver = (e, index) => {
                e.preventDefault();
                if (draggedCategoryIndex === null || draggedCategoryIndex === index) return;
                const newCats = [...categories];
                const item = newCats.splice(draggedCategoryIndex, 1)[0];
                newCats.splice(index, 0, item);
                setCategories(newCats);
                setDraggedCategoryIndex(index);
            };

            const saveTask = () => {
                if (!newTask.title.trim()) return;
                const taskData = { 
                    ...newTask, 
                    id: editingTask ? editingTask.id : Date.now().toString(),
                    price: parseInt(stripCommas(newTask.price)) || 0, 
                    categoryId: newTask.categoryId || (categories.length > 0 ? categories[0].id : ''),
                    status: editingTask ? editingTask.status : 'todo'
                };
                if (editingTask) setTasks(tasks.map(t => t.id === editingTask.id ? taskData : t));
                else setTasks([...tasks, taskData]);
                setShowAddModal(false); setEditingTask(null); setNewTask({ title: '', categoryId: '', detail: '', date: '', price: '' });
            };

            const getMonthlyExpenses = () => {
                const exp = {};
                tasks.forEach(t => { 
                    const m = t.date ? t.date.substring(0, 7) : '미정'; 
                    if (!exp[m]) exp[m] = { total: 0, items: [] };
                    exp[m].total += (parseInt(t.price) || 0);
                    exp[m].items.push(t);
                });
                return Object.entries(exp).sort((a,b) => a[0].localeCompare(b[0]));
            };

            return (
                <div className="min-h-screen pb-32 max-w-lg mx-auto bg-white shadow-sm relative">
                    <header className="sticky top-0 z-40 bg-white/95 backdrop-blur-md px-6 py-6 flex justify-between items-center border-b border-slate-50 text-left">
                        <div>
                            <h1 className="text-xl font-bold tracking-tight text-slate-900" onClick={() => setIsEditingTitle(true)}>
                                {isEditingTitle ? <input autoFocus className="border-b border-slate-900 outline-none w-full" value={appTitle} onChange={e => setAppTitle(e.target.value)} onBlur={() => setIsEditingTitle(false)} /> : appTitle}
                            </h1>
                            <p className="text-[11px] font-medium text-slate-400 mt-0.5">2026.08.22 예식 · <span className="text-rose-500 font-black">D-{dDay}</span></p>
                        </div>
                        <div className="flex flex-col items-end">
                            <div className="text-[10px] font-bold text-rose-300 uppercase mb-1">Status</div>
                            <div className="w-16 h-1 bg-slate-50 rounded-full overflow-hidden">
                                <div className="bg-rose-400 h-full transition-all duration-1000" style={{ width: `${Math.round((tasks.filter(t => t.status === 'done').length / (tasks.length || 1)) * 100)}%` }}></div>
                            </div>
                        </div>
                    </header>

                    <main className="px-6 py-8">
                        {categories.map((cat, index) => (
                            <div key={cat.id} className={`mb-10 transition-all ${draggedCategoryIndex === index ? 'dragging' : ''}`} onDragOver={(e) => handleDragOver(e, index)}>
                                <div className="flex justify-between items-center mb-4 pb-2 border-b border-slate-100">
                                    <div className="flex items-center gap-3 flex-1 text-left">
                                        <div 
                                            className="cursor-grab text-slate-200 hover:text-slate-400 p-2 -ml-2" 
                                            draggable 
                                            onDragStart={() => setDraggedCategoryIndex(index)}
                                            onDragEnd={() => setDraggedCategoryIndex(null)}
                                            onTouchStart={() => setDraggedCategoryIndex(index)}
                                            onTouchEnd={() => setDraggedCategoryIndex(null)}
                                        >
                                            <Icon name="list" size={18} />
                                        </div>
                                        <button onClick={() => setExpandedCategories(p => p.includes(cat.id) ? p.filter(i => i !== cat.id) : [...p, cat.id])} className="flex items-center gap-3 text-left flex-1">
                                            <span className="text-lg">{cat.icon}</span>
                                            <h2 className="font-bold text-sm text-slate-800">{cat.name}</h2>
                                            <span className="text-[10px] text-slate-400 ml-auto mr-2 font-bold">{formatWithCommas(tasks.filter(t => t.categoryId === cat.id).reduce((s,t) => s + (parseInt(t.price) || 0), 0))}원</span>
                                        </button>
                                    </div>
                                    <div className="flex items-center gap-1">
                                        <button onClick={() => { setActiveCategory(cat); setCategoryForm({ name: cat.name, icon: cat.icon }); setShowCategoryEditModal(true); }} className="p-2 text-slate-300 hover:text-slate-600"><Icon name="settings" size={16}/></button>
                                        <button onClick={() => setDeleteTarget({ type: 'category', id: cat.id, name: cat.name })} className="p-2 text-slate-300 hover:text-red-400"><Icon name="trash" size={16}/></button>
                                    </div>
                                </div>
                                {expandedCategories.includes(cat.id) && (
                                    <div className="space-y-3">
                                        {tasks.filter(t => t.categoryId === cat.id).map(task => {
                                            const taskDDay = calculateTaskDDay(task.date);
                                            return (
                                                <div key={task.id} className={`flex items-center gap-4 p-3 rounded-xl border border-slate-50 transition-all ${task.status === 'done' ? 'bg-slate-50 opacity-50' : 'bg-white shadow-sm'}`}>
                                                    <button onClick={() => {
                                                        const order = ['todo', 'doing', 'done'];
                                                        const nextStatus = order[(order.indexOf(task.status) + 1) % 3];
                                                        setTasks(tasks.map(t => t.id === task.id ? { ...t, status: nextStatus } : t));
                                                    }} className="flex-shrink-0">
                                                        {task.status === 'done' ? <Icon name="check" size={22} color="#1e293b" /> : task.status === 'doing' ? <Icon name="clock" size={22} color="#fbbf24" /> : <Icon name="circle" size={22} color="#e2e8f0" />}
                                                    </button>
                                                    <div className="flex-1 min-w-0 text-left" onClick={() => { setEditingTask(task); setNewTask({ title: task.title, categoryId: task.categoryId, detail: task.detail || '', date: task.date || '', price: (task.price || "").toString() }); setShowAddModal(true); }}>
                                                        <h3 className={`text-[13px] font-bold truncate ${task.status === 'done' ? 'line-through text-slate-400' : 'text-slate-800'}`}>{task.title}</h3>
                                                        <p className="text-[10px] text-slate-400 mt-0.5">{formatWithCommas(task.price)}원 | {task.status === 'done' ? '완료' : task.status === 'doing' ? '진행 중' : '시작 전'}</p>
                                                    </div>
                                                    <div className="flex flex-col items-end gap-1 flex-shrink-0">
                                                        {taskDDay && task.status !== 'done' && <span className="text-[9px] font-black px-1.5 py-0.5 rounded-full bg-rose-50 text-rose-500 tracking-tighter">{taskDDay}</span>}
                                                        <div className="flex gap-1">
                                                            <button onClick={(e) => { e.stopPropagation(); getAiAdvice('task', task); }} className="p-1.5 text-slate-200 hover:text-rose-400 active:scale-110 transition-all"><Icon name="sparkles" size={14}/></button>
                                                            <button onClick={(e) => { e.stopPropagation(); setDeleteTarget({ type: 'task', id: task.id, name: task.title }); }} className="p-1.5 text-slate-200 hover:text-red-400 active:scale-110 transition-all"><Icon name="trash" size={14}/></button>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        ))}
                        <button onClick={() => setShowNewCategoryModal(true)} className="w-full py-4 border border-dashed border-slate-200 rounded-2xl text-slate-400 text-xs font-bold hover:bg-slate-50 flex items-center justify-center gap-2 mb-12"><Icon name="plus" size={14}/> 카테고리 추가</button>

                        <div className="flex flex-col md:flex-row gap-6 mt-12 pt-10 border-t border-slate-50 text-left">
                            <section className="flex-1">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em]">Exchange</h2>
                                    <div className="flex gap-2">
                                        <button onClick={() => getAiAdvice('exchange', rates)} className="text-slate-300 hover:text-rose-400"><Icon name="sparkles" size={12}/></button>
                                        <button onClick={fetchRates} className={`text-slate-300 hover:text-slate-900 ${isRateLoading ? 'spin-anim' : ''}`}><Icon name="refresh" size={12}/></button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    {Object.entries(rates).map(([curr, data]) => (
                                        <div key={curr} className="p-3 bg-slate-50/50 rounded-xl border border-slate-100">
                                            <div className="flex justify-between items-start mb-1">
                                                <span className="text-[9px] font-bold text-slate-400 uppercase">{curr}</span>
                                                <span className="text-[8px] font-black text-slate-300">{lastRateUpdate}</span>
                                            </div>
                                            <div className="text-xs font-black text-slate-800">{data.rate} <span className="text-[10px] font-medium text-slate-400">원</span></div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                            <section className="flex-[1.5]">
                                <h2 className="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em] mb-4">Budget</h2>
                                <div className="space-y-3">
                                    {getMonthlyExpenses().map(([month, data]) => (
                                        <div key={month} className="mb-2">
                                            <div className="flex justify-between items-end mb-1 px-1">
                                                <span className="text-[10px] font-bold text-slate-400">{month}</span>
                                                <span className="text-[10px] font-black text-slate-900">{formatWithCommas(data.total)}원</span>
                                            </div>
                                            <div className="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                                                <div className="bg-rose-400 h-full transition-all duration-1000" style={{ width: `${Math.min((data.total / 10000000) * 100, 100)}%` }}></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </main>

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-48px)] max-w-md bg-white/80 backdrop-blur-xl border border-slate-200/50 px-8 py-3 rounded-full shadow-lg flex items-center justify-between z-50">
                        <button className="text-slate-400 flex flex-col items-center gap-0.5 hover:text-slate-900"><Icon name="list" size={18}/><span className="text-[8px] font-bold uppercase tracking-tighter">Plan</span></button>
                        <button onClick={() => setShowAddModal(true)} className="w-10 h-10 bg-slate-900 text-white rounded-full flex items-center justify-center shadow-lg active:scale-90"><Icon name="plus" size={20}/></button>
                        <button onClick={() => { setAiType('general'); getAiAdvice('general', {}); }} className="text-slate-400 flex flex-col items-center gap-0.5 hover:text-rose-400"><Icon name="sparkles" size={18}/><span className="text-[8px] font-bold uppercase tracking-tighter font-black">AI</span></button>
                    </nav>

                    {deleteTarget && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm fade-in text-center">
                            <div className="bg-white w-full max-w-xs rounded-3xl shadow-2xl p-8 animate-in">
                                <Icon name="trash" size={32} color="#ef4444" className="mx-auto mb-4"/>
                                <h3 className="text-base font-bold text-slate-900 mb-2">삭제하시겠습니까?</h3>
                                <p className="text-xs text-slate-400 mb-8 leading-relaxed">"{deleteTarget.name}" 항목을 삭제합니다.<br/>이 작업은 되돌릴 수 없습니다.</p>
                                <div className="flex gap-3"><button onClick={() => setDeleteTarget(null)} className="flex-1 py-3 text-xs font-bold text-slate-400 bg-slate-50 rounded-xl">취소</button><button onClick={executeDelete} className="flex-1 py-3 text-xs font-bold text-white bg-red-500 rounded-xl">삭제하기</button></div>
                            </div>
                        </div>
                    )}

                    {showAiModal && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-sm animate-in"><div className="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl flex flex-col max-h-[80vh] overflow-hidden text-left border border-slate-100"><div className="px-8 py-6 border-b flex justify-between items-center bg-slate-50/50"><div className="flex items-center gap-2.5 font-bold text-slate-800 text-sm"><Icon name="sparkles" size={18} color="#fb7185"/> AI Wedding Coach</div><button onClick={() => setShowAiModal(false)}><Icon name="x" size={20} color="#cbd5e1"/></button></div><div className="p-8 overflow-y-auto custom-scrollbar text-slate-600 text-[13px] leading-relaxed whitespace-pre-wrap">{isAiLoading ? "분석 중..." : aiResponse}</div><div className="p-6 bg-slate-50/80 border-t flex justify-center"><button onClick={() => setShowAiModal(false)} className="px-10 py-3 bg-slate-900 text-white rounded-full text-xs font-black shadow-md">닫기</button></div></div></div>
                    )}

                    {showAddModal && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-0 sm:p-6 bg-slate-900/40 backdrop-blur-sm animate-in">
                            <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl shadow-2xl overflow-hidden p-8 text-left">
                                <div className="flex justify-between items-center mb-6 font-bold text-slate-900">New Task <button onClick={() => setShowAddModal(false)}><Icon name="x" size={20}/></button></div>
                                <div className="space-y-4">
                                    <div className="flex flex-wrap gap-2">{categories.map(c => <button key={c.id} onClick={() => setNewTask({...newTask, categoryId: c.id})} className={`py-2 px-4 rounded-xl text-[11px] font-bold border transition-all ${newTask.categoryId === c.id ? 'bg-slate-900 text-white shadow-md' : 'bg-white text-slate-400'}`}>{c.name}</button>)}</div>
                                    <input type="text" value={newTask.title} onChange={e => setNewTask({...newTask, title: e.target.value})} placeholder="일정 제목" className="w-full bg-slate-50 rounded-xl px-4 py-4 text-sm outline-none focus:ring-1 focus:ring-slate-900" />
                                    
                                    <div className="grid grid-cols-2 gap-3">
                                        <input type="date" value={newTask.date} onChange={e => setNewTask({...newTask, date: e.target.value})} className="w-full bg-slate-50 rounded-xl px-4 text-sm outline-none border-none" />
                                        <input type="text" value={formatWithCommas(newTask.price)} onChange={e => { const rv = stripCommas(e.target.value); if(!isNaN(rv)) setNewTask({...newTask, price: rv}); }} placeholder="비용 (원)" className="w-full bg-slate-50 rounded-xl px-4 py-4 text-sm outline-none border-none" />
                                    </div>

                                    <textarea value={newTask.detail} onChange={e => setNewTask({...newTask, detail: e.target.value})} rows="2" placeholder="상세 메모" className="w-full bg-slate-50 rounded-xl px-4 py-4 text-sm outline-none resize-none" /><button onClick={saveTask} className="w-full bg-slate-900 text-white py-4 rounded-xl font-black text-sm shadow-lg mt-4">저장하기</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {showCategoryEditModal && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-sm animate-in text-left">
                            <div className="bg-white w-full max-w-xs rounded-2xl shadow-2xl p-6">
                                <h3 className="text-sm font-bold text-slate-900 mb-6 font-black">Category Options</h3>
                                <div className="space-y-4">
                                    <input maxLength={2} className="w-full bg-slate-50 rounded-xl py-4 text-2xl text-center outline-none border-2 border-transparent focus:border-slate-100" value={categoryForm.icon} onChange={e => setCategoryForm({...categoryForm, icon: e.target.value})} />
                                    <input className="w-full bg-slate-50 rounded-xl px-4 py-3 text-sm outline-none font-bold focus:ring-2 focus:ring-slate-100" value={categoryForm.name} onChange={e => setCategoryForm({...categoryForm, name: e.target.value})} />
                                    <div className="flex gap-2"><button onClick={() => setShowCategoryEditModal(false)} className="flex-1 py-3 text-[11px] font-bold text-slate-400">Cancel</button><button onClick={() => { setCategories(categories.map(c => c.id === activeCategory.id ? { ...c, ...categoryForm } : c)); setShowCategoryEditModal(false); }} className="flex-1 bg-slate-900 text-white py-3 rounded-xl text-[11px] font-bold active:scale-95">저장</button></div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showNewCategoryModal && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-sm animate-in text-left">
                            <div className="bg-white w-full max-w-xs rounded-2xl shadow-2xl p-6 text-left">
                                <h3 className="text-sm font-bold text-slate-900 mb-6 font-black">Add Category</h3>
                                <div className="space-y-4">
                                    <input maxLength={2} className="w-full bg-slate-50 rounded-xl py-4 text-2xl text-center outline-none border-2 border-transparent focus:border-slate-100" value={categoryForm.icon} onChange={e => setCategoryForm({...categoryForm, icon: e.target.value})} placeholder="✨" />
                                    <input className="w-full bg-slate-50 rounded-xl px-4 py-3 text-sm outline-none font-bold focus:ring-2 focus:ring-slate-100" value={categoryForm.name} onChange={e => setCategoryForm({...categoryForm, name: e.target.value})} placeholder="카테고리 이름" /><div className="flex gap-3 mt-4"><button onClick={() => setShowNewCategoryModal(false)} className="flex-1 py-3 text-[11px] font-bold text-slate-400">취소</button><button onClick={() => { setCategories([...categories, { ...categoryForm, id: Date.now().toString(), order: categories.length }]); setCategoryForm({ name: '', icon: '' }); setShowNewCategoryModal(false); }} className="flex-1 bg-slate-900 text-white py-3 rounded-xl text-[11px] font-bold shadow-lg active:scale-95">추가</button></div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
